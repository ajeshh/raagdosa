# ══════════════════════════════════════════════════════════════════════════════
# RaagDosa — Configuration
# v9.0
# ══════════════════════════════════════════════════════════════════════════════
#
# Run `raagdosa init` to set this file up interactively.
# Run `raagdosa doctor` to validate it at any time.
#
# This file has two zones:
#   ── SETTINGS ──    Things you configure once (thresholds, toggles, templates).
#   ── REFERENCE ──   Musical reference — accumulated knowledge (artist aliases,
#                     known labels, noise patterns). Written by `raagdosa learn`.
#
# v7.0: Paths (source_root, logging dirs) now live in paths.local.yaml.
#       This keeps config.yaml safe to share publicly.
#       Run `raagdosa doctor` to auto-migrate paths on first v7 run.
#
# Ready to split? When REFERENCE grows large, move it to reference.yaml and
# add: reference_file: reference.yaml — the split is clean at that point.
# ──────────────────────────────────────────────────────────────────────────────

app:
  name: RaagDosa

# ══════════════════════════════════════════════════════════════════════════════
# ── SETTINGS ──────────────────────────────────────────────────────────────────
# ══════════════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────────────
# PROFILES
# Each profile is an independent source + destination configuration.
# Switch with: raagdosa profile use <name>
# Add more with: raagdosa profile add bandcamp --source ~/Music/Bandcamp
# ──────────────────────────────────────────────────────────────────────────────
profiles:
  incoming:
    # Where your unorganised music lives. RaagDosa never modifies this.
    # Run `raagdosa init` to set this path interactively.
    source_root: /Volumes/bass/SLSK/complete

    # clean_mode: inside_root   → raagdosa/ sits inside source_root
    #             inside_parent → raagdosa/ is a sibling of source_root
    clean_mode: inside_root

    # v5.5 — All output lives under this wrapper folder.
    # Structure: <source_root>/raagdosa/Clean/   …/Review/   …/logs/
    # This keeps everything — organised music AND logs — co-located with the source,
    # so on a separate drive the full volume path makes the location unambiguous.
    wrapper_folder_name:           raagdosa

    clean_folder_name:         Clean
    review_folder_name:        Review
    clean_albums_folder_name:  Albums
    clean_tracks_folder_name:  Tracks
    review_albums_folder_name: Albums
    duplicates_folder_name:    Duplicates
    orphans_folder_name:       Orphans

active_profile: incoming

# ──────────────────────────────────────────────────────────────────────────────
# LIBRARY STRUCTURE
# How Clean/Albums/ is organised on disk.
# ──────────────────────────────────────────────────────────────────────────────
library:
  # Destination template. Tokens: {artist} {album} {year} {album_year}
  #   "{artist}/{album}"    ← recommended safe default
  #   "{album}"             ← flat — everything directly under Clean/Albums/
  template: "{artist}/{album}"

  # true → all-FLAC folders go to Artist/FLAC/Album/ (archival masters separate)
  flac_segregation: false

  singles_folder:       Singles
  va_folder:            _Various Artists
  mixes_folder:         _Mixes
  unknown_artist_label: _Unknown

# ──────────────────────────────────────────────────────────────────────────────
# CONFIDENCE ROUTING
# ──────────────────────────────────────────────────────────────────────────────
review_rules:
  min_confidence_for_clean: 0.85
  # Triage mode: folders at or above this threshold with a clean route are
  # offered for bulk-approval in the triage dashboard. Must be >= min_confidence_for_clean.
  auto_approve_threshold: 0.85

# ──────────────────────────────────────────────────────────────────────────────
# SCAN
# ──────────────────────────────────────────────────────────────────────────────
scan:
  audio_extensions:
    - .mp3
    - .flac
    - .m4a
    - .aiff
    - .wav
    - .ogg
    - .opus
    - .wma

  leaf_folders_only: true
  min_tracks: 3
  max_unreadable_track_ratio: 0.25
  follow_symlinks: false

  # Parallel workers for tag reading. 4 for SSD, 2 for spinning disk.
  workers: 4

  tag_cache_enabled: true
  streaming_batch_size: 50

  # v5.5 — Sidecar/DAW file extensions silently skipped during audio scan.
  # These are non-audio files that may sit alongside music but should be ignored.
  skip_sidecar_extensions:
    - .sfk
    - .asd
    - .reapeaks
    - .pkf
    - .db
    - .lrc

  # v5.5 — System folder names always skipped during directory walk.
  skip_system_folders:
    - __MACOSX
    - __macosx

# ──────────────────────────────────────────────────────────────────────────────
# PERFORMANCE
# ──────────────────────────────────────────────────────────────────────────────
performance:
  # tier: slow | medium | fast | ultra
  # raagdosa doctor will recommend a tier for your hardware.
  tier: medium
  # Uncomment to override individual values:
  # workers: 8
  # streaming_lookahead: 8
  # sleep_between_moves_ms: 0

# ──────────────────────────────────────────────────────────────────────────────
# IGNORE
# ──────────────────────────────────────────────────────────────────────────────
ignore:
  ignore_single_file_folders: true
  min_audio_files_for_candidate: 4
  ignore_folder_names:
    - Clean
    - Review
    - Singles
    - One-Offs
    - Dump
    - _dump
    - Unsorted
    - raagdosa    # v5.5 — ignore the wrapper folder during source scanning

# ──────────────────────────────────────────────────────────────────────────────
# TAG KEYS
# Mutagen key names tried in order. First match wins.
# ──────────────────────────────────────────────────────────────────────────────
tags:
  album_keys:       [album]
  albumartist_keys: [albumartist, album_artist, "album artist", TPE2]
  artist_keys:      [artist, TPE1]
  title_keys:       [title, TIT2]
  tracknumber_keys: [tracknumber, track, TRCK]
  discnumber_keys:  [discnumber, disc, TPOS]
  # originaldate preferred — captures original release year, not remaster date
  year_keys_prefer: [originaldate, original_date, date, year, TDRC, TYER]
  genre_keys:       [genre, TCON]
  bpm_keys:         [bpm, tbpm, TBPM]
  key_keys:         [initialkey, key, tkey, TKEY]
  label_keys:       [organization, label, publisher, TPUB]

# ──────────────────────────────────────────────────────────────────────────────
# VOTING NORMALISATION
# Applied before plurality voting. Affects which value "wins" — not final display.
# ──────────────────────────────────────────────────────────────────────────────
normalize:
  lower_case: true
  strip_whitespace: true
  collapse_whitespace: true
  strip_bracketed_phrases_for_voting: true
  strip_punctuation_for_voting: true
  strip_common_suffixes_for_voting:
    - deluxe edition
    - deluxe
    - expanded edition
    - remaster
    - remastered
    - reissue
    - anniversary edition
    - bonus tracks
    - explicit

# ──────────────────────────────────────────────────────────────────────────────
# VARIOUS ARTISTS DETECTION
# ──────────────────────────────────────────────────────────────────────────────
various_artists:
  # VA when: unique_artists / total_tracks >= this value.
  # v6.1: raised from 0.50→0.75 — require strong evidence before flagging VA.
  unique_artist_ratio_above: 0.75
  enable_heuristics: true
  label: "VA"
  albumartist_matches:
    - various artists
    - various
    - va
    - v/a
    - v.a.
    - v.a
    - vvaa
    - varios artistas
    - varios
    - artistes variés
    - aa.vv.
    # Russian
    - "разные исполнители"
    - "различные исполнители"
    - "сборник"
    # German
    - verschiedene interpreten
    - diverse interpreten
    # Japanese
    - "ヴァリアス・アーティスト"
    # Portuguese / Spanish
    - artistas varios
    - vários artistas
    - vários intérpretes

# ──────────────────────────────────────────────────────────────────────────────
# YEAR
# ──────────────────────────────────────────────────────────────────────────────
year:
  enabled: true
  require_presence_ratio: 0.50
  agreement_threshold: 0.70
  allowed_range:
    min: 1900
    max: 2099

# ──────────────────────────────────────────────────────────────────────────────
# ARTIST NORMALISATION
# ──────────────────────────────────────────────────────────────────────────────
artist_normalization:
  enabled: true

  # keep-front → The Beatles  |  move-to-end → Beatles, The  |  strip → Beatles
  the_prefix: keep-front

  normalize_hyphens: true
  fuzzy_dedup_threshold: 0.92

  # Unicode char map (e.g. Ø → O). Leave empty to preserve original characters.
  unicode_map: {}

  # Alias overrides live in the REFERENCE section below (reference.artist_aliases).
  # The aliases map below is for quick per-config overrides; the reference section
  # holds the full community-shareable alias database.
  aliases: {}

# ──────────────────────────────────────────────────────────────────────────────
# TITLE CASE  (v4.3)
# Capitalisation fixes for album names, track titles, and folder names.
# ──────────────────────────────────────────────────────────────────────────────
title_case:
  # Apply Smart Title Case to all-lowercase folder names.
  # Confirmed pattern: ~10% of real-library folders are all-lowercase (slug origin).
  # Disable if you prefer to leave casing exactly as-is.
  auto_titlecase_lowercase_folders: true

  # Words never capitalised (unless first word).
  never_cap:
    - "feat."
    - "vs."
    - "b/w"

  # Words always capitalised in a specific form.
  always_cap:
    - "DJ"
    - "MC"
    - "UK"
    - "US"
    - "NY"
    - "LA"
    - "EP"
    - "LP"
    - "II"
    - "III"
    - "IV"

# ──────────────────────────────────────────────────────────────────────────────
# FORMAT
# ──────────────────────────────────────────────────────────────────────────────
format:
  label_eps: true
  pattern_with_year: "{albumartist} - {album} ({year})"
  pattern_no_year:   "{albumartist} - {album}"
  replace_illegal_chars_with: " - "

format_suffix:
  enabled: true
  only_if_all_same_extension: true
  ignore_extension: ".mp3"
  style: brackets_upper

# ──────────────────────────────────────────────────────────────────────────────
# DJ CRATES DETECTION  (v9.0)
# Detects personal DJ organizational folders (singles dumps, genre bins, set
# prep crates, download dumps) and classifies them separately from true VA
# compilations.  Phase 1: detection only — crates route to Review/ as whole
# folders with folder_type="crate_singles" or "crate_set".
# ──────────────────────────────────────────────────────────────────────────────
djcrates:
  enabled: true
  min_tracks: 3
  # Weighted score threshold — folders scoring above this are classified as crates
  detection_threshold: 0.55
  # Album share above this = never a crate (hard veto)
  album_coherence_veto: 0.6
  # true = explode crate folders into per-artist _Singles/ subfolders
  # false = detect only, route crate folders as whole units to Review/
  explode_to_artist_folders: true
  # Default routing for crates (review = always review, clean = allow clean if track quality ok)
  default_routing: "review"

  # Built-in crate keyword patterns (matched case-insensitively against folder name)
  folder_name_patterns:
    - "singles"
    - "unsorted"
    - "to sort"
    - "downloads"
    - "incoming"
    - "misc"
    - "dump"
    - "random"
    - "temp"
    - "new music"
    - "promos"
    - "edits"
    - "tools"
    - "bangers"

  # User-defined crate patterns (regex, populated by learn-crates or manual)
  custom_crate_patterns: []

  # User-defined set prep patterns (regex)
  custom_set_patterns: []

  # Learned veto patterns — folders matching these are NOT treated as crates
  # (populated by interactive correction learning)
  crate_veto_patterns: []

  # Album tags treated as placeholders (indicate no real album identity)
  unknown_album_patterns:
    - "unknown album"
    - "untitled"
    - ""

  # Built-in set/gig prep patterns — folders matching these are preserved intact
  keep_intact_patterns:
    - "(?i)set\\b"
    - "(?i)gig\\b"
    - "(?i)party\\b"
    - "(?i)closing"
    - "(?i)opening"
    - "(?i)warm.?up"
    - "(?i)prep\\b"
    - "(?i)b2b"

  # Where preserved set-prep crates go under Review/
  keep_intact_routing: "_Sets"

# ──────────────────────────────────────────────────────────────────────────────
# EP DETECTION
# ──────────────────────────────────────────────────────────────────────────────
ep_detection:
  enabled: true
  # Minimum 2 tracks — a 2-track release labelled "EP" is still an EP.
  min_tracks: 2
  max_tracks: 6

# ──────────────────────────────────────────────────────────────────────────────
# MIX / CHART DETECTION
# ──────────────────────────────────────────────────────────────────────────────
mix_detection:
  enabled: true
  folder_name_keywords:
    - "compiled by"
    - "mixed by"
    - "essentials"
    - "selections"
  # v6.1: raised from 0.65→0.80 to match conservative VA philosophy
  unique_artist_ratio_mix: 0.80

# ──────────────────────────────────────────────────────────────────────────────
# ARTIST FEATURE HANDLING
# ──────────────────────────────────────────────────────────────────────────────
artists:
  feature_handling:
    enabled: true
    style: keep_in_artist    # keep_in_artist | move_to_title | strip
    normalize_tokens: true   # ft. / featuring / feat → feat.

# ──────────────────────────────────────────────────────────────────────────────
# MIX / VERSION SUFFIX
# ──────────────────────────────────────────────────────────────────────────────
mix_info:
  enabled: true
  detect_keywords:
    - remix
    - edit
    - mix
    - version
    - rework
    - bootleg
    - dub
    - original mix
    - extended mix
    - extended version
    - club mix
    - radio edit
    - instrumental
    - acapella
    - vip
    - flip
    - re-edit
    - re-rub
    - reprise
  style: parenthetical   # parenthetical → (Original Mix)  |  dash → - Original Mix

# ──────────────────────────────────────────────────────────────────────────────
# TITLE CLEANUP
# ──────────────────────────────────────────────────────────────────────────────
title_cleanup:
  enabled: true
  strip_trailing_domains: true
  strip_trailing_handles: true
  strip_trailing_phrases:
    - official video
    - official music video
    - official audio
    - lyrics
    - lyric video
    - visualizer
    - audio
    - hq
    - hd
    - 4k
    - free download
    - download
    - uploaded by
    - ripped by
    - encoded by
    - rip
    - webrip
    - 320kbps
    - 320 kbps
    - v0
    - vbr
    - cbr
    - 16bit
    - 24bit
    - lossless
    - hi-res
    - soundcloud
    - youtube
    - bandcamp
    - spotify
    - prod. by
    - prod by
    - produced by
    - free dl
    - direct download
    # Label/distributor noise codes appended to scene/batch releases — add as needed:
    - ftd

  keep_parenthetical_if_contains:
    - live
    - remaster
    - edit
    - mix
    - version
    - instrumental
    - acapella
    - demo
    - mono
    - stereo
    - original
    - extended
    - club
    - radio
    - vip
    - dub
    - feat
    - ft.
    - bonus

  normalize:
    replace_underscores: true
    collapse_whitespace: true
    trim_dots_spaces: true

# ──────────────────────────────────────────────────────────────────────────────
# GARBAGE NAMING
# ──────────────────────────────────────────────────────────────────────────────
garbage_naming:
  strip_bracket_stack: true
  token_flood_threshold: 5
  strip_display_noise: true
  strip_disc_indicators: true
  streaming_batch_size: 1

# ──────────────────────────────────────────────────────────────────────────────
# ARTIFACTS (non-audio files found alongside tracks)
# ──────────────────────────────────────────────────────────────────────────────
artifacts:
  enabled: true
  keep_extensions:     [.jpg, .jpeg, .pdf]
  smart_extensions:    [.png]
  smart_png_min_dimension: 800
  quarantine_extensions: [.nfo, .sfv, .txt, .url, .log, .m3u, .m3u8]
  quarantine_unknown:  true
  quarantine_folder:   Review/Artifacts

# ──────────────────────────────────────────────────────────────────────────────
# DJ SAFETY
# ──────────────────────────────────────────────────────────────────────────────
dj_safety:
  detect_dj_databases:  true
  warn_on_dj_databases: true
  halt_on_dj_databases: false
  # v5.5 — configurable list of patterns to detect DJ library databases.
  # RaagDosa warns (or halts) if any of these are found under source_root.
  database_patterns:
    - export.pdb
    - database2
    - rekordbox.xml
    - _Serato_
    - Serato Scratch
    - Serato DJ
    - PIONEER

# ──────────────────────────────────────────────────────────────────────────────
# GENRE MAP
# ──────────────────────────────────────────────────────────────────────────────
# BPM BUCKETS
# Used when the template contains {bpm_range}.
# Tracks are bucketed into ranges. Named zones override numeric ranges.
# ──────────────────────────────────────────────────────────────────────────────
bpm_buckets:
  width: 10               # Numeric bucket width: 120-129, 130-139, etc.
  named_zones:             # Optional named overrides (checked first, order matters)
    "Downtempo":    [60, 99]
    "Mid-Tempo":    [100, 119]
    "House":        [120, 132]
    "Techno":       [133, 145]
    "D&B / Jungle": [160, 180]

