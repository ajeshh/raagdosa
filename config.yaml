# ──────────────────────────────────────────────────────────────────────────────
# UNDO
# ──────────────────────────────────────────────────────────────────────────────
undo:
  allow_undo_by_id:            true
  allow_undo_by_original_path: true
  allow_undo_by_session:       true
  # v5.5 — undo all moves for a specific source folder by name.
  # Works for both folder-level (raagdosa undo --folder "My Album") and
  # track-level (raagdosa undo --tracks --folder "My Album").
  allow_undo_by_folder:        true

# ──────────────────────────────────────────────────────────────────────────────
# LOGGING
# v5.5 — All log paths are now resolved RELATIVE TO the raagdosa wrapper folder,
# not relative to your shell CWD.  So on a separate drive the logs live at:
#   /Volumes/bass/Test/raagdosa/logs/
# making it unambiguous which source they belong to.
#
# The values below are the folder/file names inside the logs/ directory.
# You rarely need to change these.
# ──────────────────────────────────────────────────────────────────────────────
logging:
  root_dir:           logs
  session_dir:        logs/sessions
  history_log:        logs/history.jsonl
  skipped_log:        logs/skipped.jsonl
  track_history_log:  logs/track-history.jsonl
  track_skipped_log:  logs/track-skipped.jsonl
  write_human_report: true
  report_filename:    report.txt
  rotate_log_max_mb:  10.0

# ══════════════════════════════════════════════════════════════════════════════
# ── BRAIN ─────────────────────────────────────────────────────────────────────
# This section accumulates intelligence as you use RaagDosa.
# `raagdosa learn` writes here. You can also edit it by hand.
#
# When this section grows large enough to feel unwieldy, move it to a
# separate file: raagdosa-brain.yaml — the split is clean at this boundary.
# ══════════════════════════════════════════════════════════════════════════════

brain:

  # Artist alias map. Key = any variant seen in tags (case-insensitive).
  # Value = the canonical folder name to use.
  artist_aliases: {}
  # Examples:
  #   "jay z":             "Jay-Z"
  #   "jayz":              "Jay-Z"
  #   "mos def":           "Yasiin Bey"
  #   "p. diddy":          "Diddy"
  #   "notorious big":     "The Notorious B.I.G."
  #   "flying lotus":      "Flying Lotus"

  # Record labels that commonly appear in albumartist tags.
  # When detected, RaagDosa re-derives the artist from track-level tags instead.
  # Pattern confirmed in 3.7% of folders (e.g. label-organised download folders).
  known_labels: []
  # Examples:
  #   - "Tropical Twista Records"
  #   - "Fértil Discos"
  #   - "Dualism Records"
  #   - "Lump Records"

  # Folder name prefixes that always signal VA / compilation content.
  # Checked before tag-based VA detection.
  va_rescue_prefixes: []
  # Examples:
  #   - "Beatport"
  #   - "Traxsource"

  # Learned noise patterns — added by `raagdosa learn --extract`.
  # Format: {pattern: "regex string", replace: "", description: "why"}
  noise_patterns: []
